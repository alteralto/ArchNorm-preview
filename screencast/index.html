<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://alteralto.github.io/ArchNorm-preview/screencast/">
<script>
  window.goatcounter = {
    path: function() {
      const prefix = '/ArchNorm-preview';
      const path = window.location.pathname || '/';
      return path.startsWith(prefix) ? (path.slice(prefix.length) || '/') : path;
    }
  };
</script>
<script data-goatcounter="https://archnorm.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<title>ArchNorm — screencast demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #11150f; }
  body {
    font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f5f1e8;
  }
  .shell {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 34px 1fr;
    background:
      radial-gradient(circle at 12% 18%, rgba(111, 151, 92, 0.24), transparent 32%),
      radial-gradient(circle at 88% 8%, rgba(140, 74, 56, 0.22), transparent 30%),
      #11150f;
  }
  .bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    font-size: 12px;
    letter-spacing: 0.02em;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(17, 21, 15, 0.88);
  }
  .brand { font-weight: 700; }
  .mode {
    color: rgba(245, 241, 232, 0.68);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #F4F1EB;
  }
</style>
</head>
<body>
  <main class="shell">
    <div class="bar">
      <span class="brand">ArchNorm screencast</span>
      <span class="mode">local API first · offline fallback · stable recording build</span>
    </div>
    <iframe src="./chat.html?scene=fire" title="ArchNorm offline chat demo"></iframe>
  </main>
</body>
</html>
